<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Morning 30</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450;9..144,560;9..144,650&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#241F32;
    --surface:#332B47;
    --cream:#F4EFE6;
    --muted:#B3A8C9;
    --gold:#D9A755;
    --gold-dim:rgba(217,167,85,0.30);
    --sage:#8FAE8B;
    --line:rgba(244,239,230,0.10);
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  button{font-family:inherit;appearance:none;-webkit-appearance:none;}
  body{
    background:var(--ink);
    color:var(--cream);
    font-family:'Karla',-apple-system,BlinkMacSystemFont,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .dawn-line{height:4px;width:100%;background:linear-gradient(90deg, var(--ink) 0%, var(--gold) 50%, var(--ink) 100%);opacity:0.55;}
  .app{max-width:480px;margin:0 auto;padding:28px 20px 60px;animation:rise .5s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  header{text-align:center;margin-bottom:26px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--sage);margin:0 0 10px;}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:560;font-size:32px;letter-spacing:-0.01em;margin:0 0 8px;color:var(--cream);}
  .subtitle{font-size:15px;color:var(--muted);margin:0;}
  .arc-wrap{position:relative;width:100%;aspect-ratio:340/120;margin:0 0 4px;}
  .arc-wrap svg.path-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;}
  .path-svg path{stroke:var(--gold-dim);}
  .node{position:absolute;width:38px;height:38px;margin-left:-19px;margin-top:-19px;border-radius:50%;border:2px solid var(--gold-dim);background:var(--surface);color:var(--cream);font-weight:700;font-size:14px;display:grid;place-items:center;cursor:pointer;transition:transform .18s ease,border-color .18s ease,background-color .18s ease,box-shadow .18s ease;padding:0;}
  .node .check{display:none;width:18px;height:18px;}
  .node .check svg{width:100%;height:100%;display:block;}
  .node[data-complete="true"]{background:var(--gold);border-color:var(--gold);color:var(--ink);}
  .node[data-complete="true"] .num{display:none;}
  .node[data-complete="true"] .check{display:block;}
  .node[aria-current="true"]{box-shadow:0 0 0 3px var(--gold-dim);transform:scale(1.1);}
  .node:focus-visible{outline:2px solid var(--gold);outline-offset:3px;}
  .week-status{text-align:center;font-size:13px;color:var(--muted);margin:14px 0 4px;}
  .week-status strong{color:var(--gold);font-weight:700;}
  .save-status{text-align:center;font-size:12px;color:var(--muted);min-height:16px;margin:0 0 22px;}
  .save-status.is-error{color:#D98A6B;}
  .day-card{background:var(--surface);border-radius:var(--radius);padding:24px 20px;border:1px solid var(--line);}
  .day-card h2{font-family:'Fraunces',Georgia,serif;font-weight:560;font-size:22px;margin:0 0 6px;color:var(--cream);}
  .day-meta{font-size:13px;color:var(--muted);margin:0 0 20px;}
  section.checklist{margin:0 0 18px;}
  details.checklist{margin:0 0 18px;}
  .day-card > *:last-child{margin-bottom:0;}
  .section-head{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--sage);margin:0 0 10px;}
  details.checklist summary.section-head{cursor:pointer;list-style:none;}
  details.checklist summary.section-head::-webkit-details-marker{display:none;}
  details.checklist summary.section-head::marker{content:'';}
  details.checklist summary.section-head::after{content:'+';font-size:16px;color:var(--muted);transition:transform .18s ease;}
  details[open].checklist summary.section-head::after{transform:rotate(45deg);}
  ul.items{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;}
  .item .check{display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
  .item input[type="checkbox"]{position:absolute;opacity:0;width:1px;height:1px;}
  .box{width:26px;height:26px;border-radius:50%;border:2px solid var(--muted);flex-shrink:0;display:grid;place-items:center;transition:background-color .18s ease,border-color .18s ease;margin-top:1px;}
  .box svg{width:14px;height:14px;opacity:0;transform:scale(0.5);transition:opacity .15s ease,transform .15s ease;}
  .item input:checked + .box{background:var(--gold);border-color:var(--gold);}
  .item input:checked + .box svg{opacity:1;transform:scale(1);}
  .item input:focus-visible + .box{outline:2px solid var(--gold);outline-offset:2px;}
  .text{display:flex;flex-direction:column;gap:2px;}
  .name{font-size:15px;font-weight:500;color:var(--cream);}
  .detail{font-size:13px;color:var(--muted);}
  .item input:checked ~ .text .name{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--gold-dim);}
  .day7-note{font-size:14px;color:var(--muted);line-height:1.5;margin:0 0 18px;}
  .complete-toggle{display:flex;align-items:center;gap:12px;padding-top:4px;}
  .complete-toggle .name{font-weight:600;}
  footer{text-align:center;margin-top:24px;}
  .reset-btn{background:none;border:none;color:var(--muted);font-size:13px;text-decoration:underline;text-decoration-color:var(--gold-dim);cursor:pointer;padding:8px;}
  .reset-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px;}
  .confirm-row{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;font-size:13px;color:var(--muted);}
  .confirm-row button{font-size:13px;font-weight:700;padding:6px 14px;border-radius:999px;border:1px solid var(--gold-dim);background:transparent;color:var(--cream);cursor:pointer;}
  .confirm-row button.primary{background:var(--gold);color:var(--ink);border-color:var(--gold);}
  .confirm-row button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){*{transition:none !important;animation:none !important;}}
</style>
</head>
<body>
<div class="dawn-line" aria-hidden="true"></div>
<div class="app">
  <header>
    <p class="eyebrow">A home practice</p>
    <h1>The Morning 30</h1>
    <p class="subtitle">Quiet strength, one small circuit at a time.</p>
  </header>

  <nav class="arc-wrap" aria-label="Week navigation">
    <svg class="path-svg" viewBox="0 0 340 120" aria-hidden="true">
      <path d="M20,100 Q170,-60 320,100" fill="none" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </nav>
  <p class="week-status" id="week-status"></p>
  <p class="save-status" id="save-status" aria-live="polite"></p>

  <main class="day-card" id="day-card" aria-live="polite">
    <p class="day-meta">Loading your practice...</p>
  </main>

  <footer>
    <div id="footer-controls"></div>
  </footer>
</div>

<script>
(function(){
  "use strict";
  var STORAGE_KEY = "morning30-state-v1";

  var warmup = [
    {name:"March in place", detail:"1 min"},
    {name:"Arm circles and shoulder rolls", detail:"30 sec"},
    {name:"Cat cow", detail:"8 reps"},
    {name:"Hip circles", detail:"10 each direction"},
    {name:"Slow bodyweight squats", detail:"10 reps"}
  ];
  var cooldown = [
    {name:"Child's pose", detail:"30 sec"},
    {name:"Standing forward fold", detail:"30 sec"},
    {name:"Seated spinal twist", detail:"30 sec per side"},
    {name:"Chest and shoulder stretch", detail:"30 sec per side"},
    {name:"Quad and hip flexor stretch", detail:"30 sec per side"}
  ];
  var days = [
    { title:"Upper Body Push + Core", meta:"3 rounds \u00b7 45-60 sec rest between rounds",
      main:[
        {name:"Slow push ups (knee or full)", detail:"tempo 3-1-3 \u00b7 10-12 reps"},
        {name:"Standing shoulder press", detail:"3kg each hand \u00b7 12-15 reps"},
        {name:"Floor chest press, lying on mat", detail:"3kg each hand \u00b7 12-15 reps"},
        {name:"Tricep kickbacks", detail:"1kg each hand \u00b7 15 reps per arm"},
        {name:"Forearm plank hold", detail:"30-45 sec"}
      ]},
    { title:"Lower Body: Quads & Glutes", meta:"3 rounds \u00b7 45-60 sec rest between rounds",
      main:[
        {name:"Slow bodyweight squats", detail:"tempo 3-1-3 \u00b7 15-20 reps"},
        {name:"Static lunges, holding 3kg each hand", detail:"12 reps per leg"},
        {name:"Glute bridges, 3kg across hips", detail:"15-20 reps \u00b7 2 sec pause at top"},
        {name:"Side lying leg lifts", detail:"15 reps per side"},
        {name:"Wall sit", detail:"30-45 sec"}
      ]},
    { title:"Upper Body Pull + Core", meta:"3 rounds \u00b7 45-60 sec rest between rounds",
      main:[
        {name:"Bent over rows", detail:"3kg each hand \u00b7 15 reps"},
        {name:"Renegade rows on the mat", detail:"3kg each hand \u00b7 10 reps per side"},
        {name:"Reverse flyes", detail:"1kg each hand \u00b7 15 reps"},
        {name:"Slow bicep curls", detail:"3kg each hand \u00b7 15 reps"},
        {name:"Bird dog", detail:"10 reps per side"}
      ]},
    { title:"Lower Body: Glutes & Hamstrings", meta:"3 rounds \u00b7 45-60 sec rest between rounds",
      main:[
        {name:"Single leg glute bridge", detail:"12 reps per leg"},
        {name:"Romanian deadlifts", detail:"3kg each hand \u00b7 slow tempo \u00b7 15 reps"},
        {name:"Fire hydrants", detail:"15 reps per side"},
        {name:"Donkey kicks, pulse at top", detail:"15 reps per side"},
        {name:"Clamshells", detail:"15 reps per side"}
      ]},
    { title:"Full Body Tone & Conditioning", meta:"2-3 rounds \u00b7 20-30 sec rest, keep pace brisk",
      main:[
        {name:"Squat to overhead press", detail:"3kg each hand \u00b7 12 reps"},
        {name:"Push up to plank walk out", detail:"8 reps"},
        {name:"Reverse lunge with bicep curl", detail:"3kg each hand \u00b7 10 reps per leg"},
        {name:"Standing oblique twists", detail:"1kg each hand \u00b7 15 reps per side"},
        {name:"Plank shoulder taps", detail:"20 total"}
      ]},
    { title:"Core & Mobility", meta:"2 rounds \u00b7 a lighter day",
      main:[
        {name:"Dead bug", detail:"12 reps per side"},
        {name:"Slow bicycle crunches", detail:"20 total"},
        {name:"Side plank", detail:"20-30 sec per side"},
        {name:"Glute bridge march", detail:"12 reps per leg"},
        {name:"Standing side bends", detail:"1kg each hand \u00b7 15 reps per side"}
      ]}
  ];

  var nodePoints = [
    {x:20,y:100},{x:70,y:56},{x:120,y:29},{x:170,y:20},
    {x:220,y:29},{x:270,y:56},{x:320,y:100}
  ];

  var state = null;

  function defaultState(){
    var s = { currentDay: 1, days: {} };
    for (var d = 1; d <= 6; d++){
      var dayDef = days[d-1];
      s.days[d] = {
        warmup: warmup.map(function(){return false;}),
        main: dayDef.main.map(function(){return false;}),
        cooldown: cooldown.map(function(){return false;})
      };
    }
    s.days[7] = { done:false };
    return s;
  }

  function normalizeState(parsed){
    var fresh = defaultState();
    if (!parsed || typeof parsed !== "object") return fresh;
    fresh.currentDay = (parsed.currentDay >= 1 && parsed.currentDay <= 7) ? parsed.currentDay : 1;
    for (var d = 1; d <= 6; d++){
      var src = parsed.days && parsed.days[d];
      if (src){
        if (Array.isArray(src.warmup) && src.warmup.length === fresh.days[d].warmup.length) fresh.days[d].warmup = src.warmup.map(Boolean);
        if (Array.isArray(src.main) && src.main.length === fresh.days[d].main.length) fresh.days[d].main = src.main.map(Boolean);
        if (Array.isArray(src.cooldown) && src.cooldown.length === fresh.days[d].cooldown.length) fresh.days[d].cooldown = src.cooldown.map(Boolean);
      }
    }
    if (parsed.days && parsed.days[7]) fresh.days[7].done = !!parsed.days[7].done;
    return fresh;
  }

  function isDayComplete(d){
    if (d === 7) return !!(state.days[7] && state.days[7].done);
    var rec = state.days[d];
    if (!rec) return false;
    return rec.warmup.every(Boolean) && rec.main.every(Boolean) && rec.cooldown.every(Boolean);
  }

  function completeCount(){
    var n = 0;
    for (var d=1; d<=7; d++){ if (isDayComplete(d)) n++; }
    return n;
  }

  function loadState(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw){
        state = normalizeState(JSON.parse(raw));
      } else {
        state = defaultState();
      }
    } catch (e){
      console.error("Could not load saved progress", e);
      state = defaultState();
    }
    render();
  }

  function setSaveStatus(ok){
    var el = document.getElementById("save-status");
    if (!el) return;
    if (ok){
      el.textContent = "";
      el.classList.remove("is-error");
    } else {
      el.textContent = "Couldn't save to this device just now";
      el.classList.add("is-error");
    }
  }

  function saveState(){
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setSaveStatus(true);
    } catch (e){
      console.error("Could not save progress", e);
      setSaveStatus(false);
    }
  }

  function checkIcon(){
    return '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  function renderArc(){
    var wrap = document.querySelector(".arc-wrap");
    var old = wrap.querySelectorAll(".node");
    for (var k=0;k<old.length;k++){ old[k].remove(); }
    for (var i = 0; i < 7; i++){
      (function(i){
        var d = i+1;
        var pt = nodePoints[i];
        var btn = document.createElement("button");
        btn.className = "node";
        btn.type = "button";
        btn.style.left = (pt.x/340*100) + "%";
        btn.style.top = (pt.y/120*100) + "%";
        var complete = isDayComplete(d);
        btn.setAttribute("data-complete", complete ? "true" : "false");
        if (state.currentDay === d) btn.setAttribute("aria-current","true");
        var dayTitle = d === 7 ? "Active Recovery" : days[d-1].title;
        btn.setAttribute("aria-label", "Day " + d + ": " + dayTitle + (complete ? ", complete" : ", not complete"));
        btn.innerHTML = '<span class="num">'+d+'</span><span class="check">'+checkIcon()+'</span>';
        btn.addEventListener("click", function(){ state.currentDay = d; saveState(); render(); });
        wrap.appendChild(btn);
      })(i);
    }
  }

  function itemRow(day, section, idx, item){
    var checked = state.days[day][section][idx] ? "checked" : "";
    var id = "c-" + day + "-" + section + "-" + idx;
    return '<li class="item"><label class="check" for="'+id+'">' +
      '<input type="checkbox" id="'+id+'" data-day="'+day+'" data-section="'+section+'" data-index="'+idx+'" '+checked+' />' +
      '<span class="box" aria-hidden="true">'+checkIcon()+'</span>' +
      '<span class="text"><span class="name">'+item.name+'</span><span class="detail">'+item.detail+'</span></span>' +
      '</label></li>';
  }

  function sectionBlock(day, section, label, items, openByDefault){
    var doneCount = state.days[day][section].filter(Boolean).length;
    var rows = items.map(function(it,idx){ return itemRow(day, section, idx, it); }).join("");
    if (openByDefault){
      return '<section class="checklist" data-section="'+section+'">' +
        '<p class="section-head"><span>'+label+'</span><span>'+doneCount+' of '+items.length+'</span></p>' +
        '<ul class="items">'+rows+'</ul></section>';
    }
    return '<details class="checklist" data-section="'+section+'">' +
      '<summary class="section-head"><span>'+label+'</span><span>'+doneCount+' of '+items.length+'</span></summary>' +
      '<ul class="items">'+rows+'</ul></details>';
  }

  function updateSectionCount(day, section){
    var card = document.getElementById("day-card");
    var el = card.querySelector('[data-section="'+section+'"] .section-head span:last-child');
    if (!el) return;
    var total = state.days[day][section].length;
    var doneCount = state.days[day][section].filter(Boolean).length;
    el.textContent = doneCount + " of " + total;
  }

  function renderDayCard(){
    var card = document.getElementById("day-card");
    var d = state.currentDay;
    if (d === 7){
      var done = state.days[7].done;
      card.innerHTML =
        '<h2>Active Recovery</h2>' +
        '<p class="day-meta">Rest, or a gentle stretch, your choice</p>' +
        '<p class="day7-note">Training 6 days this week: take this one fully off. Training all 7: a slow full body stretch flow, 10 to 15 minutes, no weights.</p>' +
        '<div class="complete-toggle"><label class="check" for="day7-done">' +
        '<input type="checkbox" id="day7-done" '+(done?"checked":"")+' />' +
        '<span class="box" aria-hidden="true">'+checkIcon()+'</span>' +
        '<span class="text"><span class="name">Recovery day done</span></span>' +
        '</label></div>';
      document.getElementById("day7-done").addEventListener("change", function(e){
        state.days[7].done = e.target.checked;
        saveState();
        renderArc();
        renderWeekStatus();
      });
      return;
    }
    var dayDef = days[d-1];
    card.innerHTML =
      '<h2>'+dayDef.title+'</h2>' +
      '<p class="day-meta">'+dayDef.meta+'</p>' +
      sectionBlock(d, "warmup", "Warm Up", warmup, false) +
      sectionBlock(d, "main", "Main Circuit", dayDef.main, true) +
      sectionBlock(d, "cooldown", "Cool Down", cooldown, false);

    var boxes = card.querySelectorAll('input[type="checkbox"]');
    for (var b=0;b<boxes.length;b++){
      boxes[b].addEventListener("change", function(e){
        var day = Number(e.target.getAttribute("data-day"));
        var section = e.target.getAttribute("data-section");
        var idx = Number(e.target.getAttribute("data-index"));
        state.days[day][section][idx] = e.target.checked;
        saveState();
        updateSectionCount(day, section);
        renderArc();
        renderWeekStatus();
      });
    }
  }

  function renderWeekStatus(){
    var el = document.getElementById("week-status");
    var n = completeCount();
    if (n === 7){
      el.innerHTML = '<strong>7 of 7</strong> days. A full week, nicely done.';
    } else {
      el.innerHTML = '<strong>'+n+' of 7</strong> days this week';
    }
  }

  function renderFooter(){
    var el = document.getElementById("footer-controls");
    el.innerHTML = '<button class="reset-btn" id="reset-btn">Start a new week</button>';
    document.getElementById("reset-btn").addEventListener("click", function(){
      el.innerHTML = '<div class="confirm-row"><span>Clear the ticks for this week?</span>' +
        '<button id="confirm-yes" class="primary">Yes, start fresh</button>' +
        '<button id="confirm-no">Cancel</button></div>';
      document.getElementById("confirm-yes").addEventListener("click", function(){
        state = defaultState();
        saveState();
        render();
      });
      document.getElementById("confirm-no").addEventListener("click", renderFooter);
    });
  }

  function render(){
    renderArc();
    renderWeekStatus();
    renderDayCard();
    renderFooter();
  }

  loadState();
})();
</script>
</body>
</html>
